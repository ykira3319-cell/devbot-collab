<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBook - Inscription</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.container {
  background: rgba(22, 35, 43, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
h2 { color: white; margin-bottom: 30px; font-size: 28px; }
input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: 2px solid #444;
  border-radius: 10px;
  background: #0f1e25;
  color: white;
  font-size: 14px;
  transition: 0.3s;
}
input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: #42b72a;
  color: white;
  transition: 0.3s;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
.photo-preview {
  width: 100px;
  height: 100px;
  margin: 15px auto;
  border-radius: 50%;
  background: #0f1e25;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
  font-size: 12px;
  overflow: hidden;
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
<div class="container">
<h2>📝 Créer un compte</h2>
<input type="text" id="username" placeholder="Nom d'utilisateur">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">
<input type="file" id="photo" accept="image/*" onchange="previewPhoto()">
<div class="photo-preview" id="preview">📸 Photo</div>
<button onclick="register()">S'inscrire</button>
</div>

<script>
function previewPhoto() {
  let file = document.getElementById("photo").files[0];
  let preview = document.getElementById("preview");
  if (file) {
    let reader = new FileReader();
    reader.onload = function() {
      preview.innerHTML = `<img src="${reader.result}">`;
    };
    reader.readAsDataURL(file);
  }
}

function register() {
  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let photo = document.getElementById("photo").files[0];

  if (!username || !email || !password || !photo) {
    alert("❌ Remplis tous les champs");
    return;
  }

  let reader = new FileReader();
  reader.onload = function() {
    let user = { username, email, password, photo: reader.result };
    localStorage.setItem("devbook_user", JSON.stringify(user));
    alert("✅ Compte créé avec succès!");
    window.location.href = "home.html";
  };
  reader.readAsDataURL(photo);
}
</script>
</body>
</html>
